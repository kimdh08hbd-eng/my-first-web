    <main>
        
        <div id="login-box" style="text-align: center;margin:50px;">
        <h2>🔒시스템 인증이 필요합니다</h2>
        <input type="text" id="userName" placeholder="사용자 이름"><br>
        <input type="password" id="userPw" placeholder="암호 4자리"><br>
        <button onclick="checkLogin()">입장하기</button>
     </div>
     <div id="secret-area" style="display:none;">
     
        <div class="display-box">
            <img id="targetImg" src="img/8070_11757_3847.jpg" style="width: 100%; max-width: 500px;"/>
            <p id="targetDesc">4월9일:첫 범인 검거!</p>
        </div>

        <div class="thumb-list">
            <img src="img/8070_11757_3847.jpg" onclick="show('./img/8070_11757_3847.jpg','범인 제압')" >
            <img src="img/es.jpg" onclick="show('./img/es.jpg','대테러 특수작전 진압')" >
            <img src="img/테러범 진압.jpg" onclick="show('./img/테러범 진압.jpg','테러범 진압')" >
            <img src="img/출동.jpg" onclick="show('img/출동.jpg','출동')" >
            <img src="img/청년경찰.jpg" onclick="show('img/청년경찰.jpg','청년 경찰 영화')" >
            <img src="img/시위진압.jpg" onclick="show('img/시위진압.jpg','시위진압')" >
            <img src="img/범죄도시.jpg" onclick="show('img/범죄도시.jpg','범죄도시')" >
            <img src="img/구출작전.jpg" onclick="show('img/구출작전.jpg','구출작전')" >
            <img src="img/구조작전.jpg" onclick="show('img/구조작전.jpg','구조작전')" >
            <img src=" /img/포돌이포순이.jpg" onclick="show('img/포돌이포순이.jpg','포돌이 포순이')" >

            
            
        </div>  
            <hr>
                <div id="settings" style="margin-top: 30px; padding: 20px; border: 1px solid #ddd; background: #fff;">
                <h4>⚙️ 설정 및 로그아웃</h4>
                <p style="font-size: 0.9em; color: #666;">*보안을 위해 정기적으로 비밀번호를 변경해 주세요.</p>
                <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
                <button onclick="changePassword()">비밀번호 변경</button>
                <button onclick="logout()">로그아웃</button>
            </div>
     </div>

    <script>
    function show(imgPath, text){
        document.getElementById("targetImg").src=imgPath;
        document.getElementById("targetDesc").innerText=text;
    }
    function checkLogin() {
  let name = document.getElementById("userName").value;
  let pw = document.getElementById("userPw").value;

  // 금고에서 비밀번호를 가져오거나 없으면 '1234'를 기본값으로 설정
  let currentPw = localStorage.getItem("userPassword") || "1234";

  if (pw === currentPw && name !== "") {
    // [밑바탕 작업] 이름과 상태를 금고(localStorage)에 넣습니다.
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("savedName", name);
    localStorage.setItem("userPassword", currentPw);

    alert(name + "님, 인증 정보가 저장소에 기록되었습니다.");

    // 즉시 화면 전환 및 이름 표시
    document.getElementById("login-box").style.display = "none";
    document.getElementById("secret-area").style.display = "block";
    document.getElementById("user-display").innerText = name;

  } else {
    alert("이름을 입력하지 않았거나 암호가 틀렸습니다.");
  }
}
            window.onload = function() {
                let isLoggedIn = localStorage.getItem("isLoggedIn"); let savedName = localStorage.getItem("savedName");

                    if (isLoggedIn === "true") {
                        document.getElementById("login-box").style.display = "none";
                        document.getElementById("secret-area").style.display = "block";
                        document.getElementById("user-display").innerText = savedName;
                    }
                };
                    function changePassword() {
                let newPw = document.getElementById("newPw").value;
                if (newPw.length < 4) { alert("암호는 4자리 이상이어야 합니다."); return; }
                localStorage.setItem("userPassword", newPw);
                alert("비밀번호가 변경되었습니다.");
            }

            function logout() {
                if (confirm("로그아웃 하시겠습니까?")) {
                    localStorage.removeItem("isLoggedIn");
                    localStorage.removeItem("savedName");
                    location.href = "index.html";
                }
            }
    </script>
